SETTINGS:
  VALUE: Value
  SECTIONS:
    CHANGE_PASSWORD: Change password
    APP_SETTINGS: App settings
  BY_KEY:
    CHECK_CRONTAB_EXPR:
      LABEL: Check Crontab expression
      HINT: |-
        Crontab expression for periodic job e.g.
        0 * * * *' for every hour.

        Click for more info.
      LINK: https://crontab.guru/
    UPDATE_CRONTAB_EXPR:
      LABEL: Update Crontab expression
      HINT: |-
        Crontab expression for periodic job e.g.
        0 * * * *' for every hour.

        Click for more info.
      LINK: https://crontab.guru/
    NOTIFICATION_URLS:
      LABEL: Notification URLs
      HINT: |-
        URLs for notifications via Apprise e.g. tgram://<token>/<chat_id>
        You can specify several, each on a new line.

        Click for more info.
      LINK: https://github.com/caronc/apprise?tab=readme-ov-file#productivity-based-notifications
    TIMEZONE:
      LABEL: Timezone
      HINT: Timezone in IANA format, e.g. Europe/Moscow
    REGISTRY_REQ_DELAY:
      LABEL: Registry requests delay, in seconds
      HINT: Delay between registry requests like manifest, pull, etc. to avoid rate limits.
    PULL_BEFORE_CHECK:
      LABEL: Pull before check
      HINT: This can be useful if you use a registry proxy that only updates manifests when pulling.
    UPDATE_ONLY_RUNNING:
      LABEL: Update only running containers
      HINT: Be careful, when updating non-running containers, some parts of the configuration may be lost.
    NOTIFICATION_TITLE_TEMPLATE:
      LABEL: Notification title template
      HINT: |-
        Jinja2 template of notification title.

        Click for more info.
      LINK: https://github.com/Quenary/tugtainer?tab=readme-ov-file#notifications
    NOTIFICATION_BODY_TEMPLATE:
      LABEL: Notification body template
      HINT: |-
        Jinja2 template of notification body.

        Click for more info.
      LINK: https://github.com/Quenary/tugtainer?tab=readme-ov-file#notifications
    INSECURE_REGISTRIES:
      LABEL: Insecure registries
      HINT: |-
        One registry per line, e.g.

        my.registry.local
        10.0.0.25:5000

        This setting affects only HEAD request (check for update).
        For pull you have to modify /etc/docker/daemon.json at host machine.
        This can be useful if you use a custom registry.
    SEND_TEST_NOTIFICATION: Send test notification
