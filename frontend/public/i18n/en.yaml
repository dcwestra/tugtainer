  CARD:
    DELETE_CONFIRM: Do you want to delete this host?
    HELP:
      LABEL: Help
      TEXT: |-
        If you did not mount docker socket directly to the container, then DOCKER_HOST
        environment variable is required which you can set in docker-compose or docker
        command.
        For the main Tugtainer instance the agent address is http://127.0.0.1:8001
        and the secret is undefined by default, which you can change with AGENT_SECRET
        environment variable.
        For remote hosts you have to deploy Tugtainer Agent (ghcr.io/quenary/tugtainer-agent)
        and use it's address and secret in the corresponding fields.
      HELP_BTN: Deploy guideline
    GENERAL:
      LABEL: General
      ID: ID
      NAME: Name
      ENABLED: Enabled
      PRUNE: Prune
      PRUNE_HINT: Enable auto-pruning of images after scheduled process.
      PRUNE_ALL: Prune all
      PRUNE_ALL_HINT: This toggle stands for --all flag of 'docker image prune' command.
      URL: Agent address
      URL_PLACEHOLDER: http://127.0.0.1:8001
      SECRET: Agent secret
      SSL: SSL
      SSL_HINT: Whether to use SSL verification for backend > agent requests.
      TIMEOUT: Agent timeout
      TIMEOUT_HINT:
        Timeout in seconds for typically fast agent requests. It does
        not affect potentially long requests such as container create or image pull.
      CONTAINER_HC_TIMEOUT: Container healthcheck timeout
      CONTAINER_HC_TIMEOUT_HINT:
        Timeout in seconds for how long the app will wait
        for a healthcheck during an update before starting a rollback.
      HOST_TYPE: Host type
      SWARM_CLUSTER_NAME: Cluster name (optional)
      SWARM_CLUSTER_NAME_PLACEHOLDER: e.g. production-cluster
      SWARM_CLUSTER_NAME_HINT: |-
        Human-readable label for this swarm cluster.
        If omitted, the cluster ID is used. Auto-populated from the agent's SWARM_CLUSTER_LABEL env var if set.
